name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  java-fast-gate:
    name: Java fast gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      - name: Compile core
        run: ./mvnw -B -pl . compile test-compile
        shell: bash

      - name: Run HomomorphicProcessorTest
        run: ./mvnw -B -pl . test -Dtest=HomomorphicProcessorTest
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./**/target/site/jacoco/jacoco.xml
          name: java-fast-gate
          fail_ci_if_error: false

  native-build-matrix:
    name: Native build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: java-fast-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            vcpkg_triplet: x64-linux
            library_path: build-native/blindbean_fhe.so
            artifact_name: blindbean_fhe-linux-x64
            cmake_generator_args: ""
          - os: macos-latest
            label: macos-arm64
            vcpkg_triplet: arm64-osx
            library_path: build-native/blindbean_fhe.dylib
            artifact_name: blindbean_fhe-macos-arm64
            cmake_generator_args: ""
          - os: windows-latest
            label: windows-x64
            vcpkg_triplet: x64-windows-static
            library_path: build-native/Release/blindbean_fhe.dll
            artifact_name: blindbean_fhe-windows-x64
            cmake_generator_args: "-A x64"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: '6f29f12e82a8293156836ad81cc9bf5af41fe836'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          runVcpkgInstall: false

      - name: Configure Native Build (CMake + SEAL)
        id: cmake_config
        run: |
          cmake -S src/main/native -B build-native \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} \
            ${{ matrix.cmake_generator_args }}
        shell: bash

      - name: Show vcpkg Error Log on Failure
        if: failure() && steps.cmake_config.outcome == 'failure'
        run: |
          if [ -f build-native/vcpkg-manifest-install.log ]; then
            cat build-native/vcpkg-manifest-install.log
          fi
        shell: bash

      - name: Build Native Library
        run: cmake --build build-native --config Release
        shell: bash

      - name: Verify native library exists
        run: |
          test -f "${{ matrix.library_path }}"
          ls -lh "${{ matrix.library_path }}"
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.library_path }}
          if-no-files-found: error
          retention-days: 30

  full-windows:
    name: Full Windows test
    runs-on: windows-latest
    needs: native-build-matrix
    timeout-minutes: 45

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 26
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      - name: Download Windows native artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blindbean_fhe-windows-x64
          path: build-native/Release

      - name: Verify downloaded DLL exists
        run: |
          if (!(Test-Path "build-native/Release/blindbean_fhe.dll")) {
            Write-Error "DLL not found after artifact download."
            exit 1
          }
          Write-Host "DLL size: $((Get-Item build-native/Release/blindbean_fhe.dll).Length) bytes"
        shell: pwsh

      - name: Install Core Library
        run: .\mvnw.cmd clean install -B "-Dblindbean.native.path=build-native/Release"
        shell: pwsh

      - name: Build and Test Example Application
        run: ..\mvnw.cmd clean test -B "-Dblindbean.native.path=../build-native/Release"
        shell: pwsh
        working-directory: blindbean-example

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./**/target/site/jacoco/jacoco.xml
          name: full-windows
          fail_ci_if_error: false

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: surefire-reports-windows
          path: |
            target/surefire-reports/
            blindbean-example/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14
