name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'oracle'
        cache: maven

    - name: Compile Native Backend (DLL)
      run: |
        cd src/main/native
        gcc -shared -o blindbean_fhe.dll blindbean_fhe.c
      shell: bash
      
    - name: Install Core Library
      run: mvn clean install -B

    - name: Build and Test Example Application
      run: |
        cd blindbean-example
        mvn clean test -B
