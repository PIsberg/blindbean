name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  java-fast-gate:
    name: Java fast gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 26
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      # Build every module and run everything that does not need blindbean_fhe.dll — the annotation
      # processor, Paillier, the key stamp, contexts, rotation, the JUnit extension. The reactor
      # resolves modules internally, so no install step is needed; the tests all live in
      # blindbean-tests, which is where the JaCoCo report lands.
      - name: Build + run the non-native test suite
        run: ./mvnw -B test -DexcludedGroups=native
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./blindbean-tests/target/site/jacoco/jacoco.xml
          name: java-fast-gate
          fail_ci_if_error: false

  native-build-matrix:
    name: Native build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: java-fast-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            vcpkg_triplet: x64-linux
            library_path: build-native/blindbean_fhe.so
            artifact_name: blindbean_fhe-linux-x64
            cmake_generator_args: ""
          - os: macos-latest
            label: macos-arm64
            vcpkg_triplet: arm64-osx
            library_path: build-native/blindbean_fhe.dylib
            artifact_name: blindbean_fhe-macos-arm64
            cmake_generator_args: ""
          - os: windows-latest
            label: windows-x64
            vcpkg_triplet: x64-windows-static
            library_path: build-native/Release/blindbean_fhe.dll
            artifact_name: blindbean_fhe-windows-x64
            cmake_generator_args: "-A x64"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@5e0cab206a5ea620130caf672fce3e4a6b5666a1 # v11.5
        with:
          vcpkgGitCommitId: 'b5229343b4b80264ed51e89c6a7dcd0cbe85e9cc'
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          runVcpkgInstall: false

      - name: Configure Native Build (CMake + SEAL)
        id: cmake_config
        run: |
          cmake -S blindbean-fhe/src/main/native -B build-native \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} \
            ${{ matrix.cmake_generator_args }}
        shell: bash

      - name: Show vcpkg Error Log on Failure
        if: failure() && steps.cmake_config.outcome == 'failure'
        run: |
          if [ -f build-native/vcpkg-manifest-install.log ]; then
            cat build-native/vcpkg-manifest-install.log
          fi
        shell: bash

      - name: Build Native Library
        run: cmake --build build-native --config Release
        shell: bash

      - name: Verify native library exists
        run: |
          test -f "${{ matrix.library_path }}"
          ls -lh "${{ matrix.library_path }}"
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.library_path }}
          if-no-files-found: error
          retention-days: 30

  full-windows:
    name: Full Windows test
    runs-on: windows-latest
    needs: native-build-matrix
    timeout-minutes: 45

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 26
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      - name: Download Windows native artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: blindbean_fhe-windows-x64
          path: build-native/Release

      - name: Verify downloaded DLL exists
        run: |
          if (!(Test-Path "build-native/Release/blindbean_fhe.dll")) {
            Write-Error "DLL not found after artifact download."
            exit 1
          }
          Write-Host "DLL size: $((Get-Item build-native/Release/blindbean_fhe.dll).Length) bytes"
        shell: pwsh

      # Reactor build: compiles all six modules, runs the full test suite (incl. native), and
      # installs each module to the local repo so the standalone example / load-tests /
      # module-path checks can resolve them.
      #
      # No -Dblindbean.native.path here on purpose: surefire forks with the blindbean-tests module
      # as its cwd, so a RELATIVE path would resolve under that module, not the repo root. The
      # blindbean-tests pom defaults it to ${project.basedir}/../build-native/Release, which points
      # at the DLL the download step placed at the repo root.
      - name: Build + test all modules
        run: .\mvnw.cmd clean install -B
        shell: pwsh

      # The crown jewel of the split: a consumer on the MODULE path, in its own JVM, resolving the
      # split modules, discovering the processor on the --processor-module-path, and calling native
      # FFM from the named fhe module. This is the check that fails if a module-info export is wrong.
      - name: Module-path consumer test
        run: ..\mvnw.cmd clean test -B "-Dblindbean.native.path=../build-native/Release"
        shell: pwsh
        working-directory: module-path-tests

      - name: Build and Test Example Application
        run: ..\mvnw.cmd clean test -B "-Dblindbean.native.path=../build-native/Release"
        shell: pwsh
        working-directory: blindbean-example

      # A small-load regression gate, not a benchmark. The assertions are the point: BFV must keep
      # its multiplicative depth (>= 4), batched expansion must stay in single digits, and no thread
      # may read back a value it did not write. Numbers on a shared runner are noise — the gates are
      # deliberately loose so they catch a broken batch path, not a busy CI box.
      #
      # -Dstress.max.ops caps the two loops that dominate the runtime; the full sweep (the figures
      # in load-tests/results/) is a local/release run. ~10s here vs ~2min at full load.
      - name: Load-test regression gate (small load)
        run: ..\mvnw.cmd clean test -B "-Dblindbean.native.path=../build-native/Release" "-Dstress.max.ops=50"
        shell: pwsh
        working-directory: load-tests

      - name: Upload load-test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: load-test-reports
          path: load-tests/target/*.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./blindbean-tests/target/site/jacoco/jacoco.xml,./blindbean-example/target/site/jacoco/jacoco.xml
          name: full-windows
          fail_ci_if_error: false

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: surefire-reports-windows
          path: |
            target/surefire-reports/
            blindbean-example/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 14
