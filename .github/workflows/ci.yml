name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'oracle'
        cache: maven

    # ── Install vcpkg and Microsoft SEAL ──
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'  # 2024.05.24 release
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'

    - name: Configure Native Build (CMake + SEAL)
      id: cmake_config
      run: |
        cmake -S src/main/native -B build-native `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows `
          -A x64
      shell: pwsh

    - name: Show vcpkg Error Log on Failure
      if: failure() && steps.cmake_config.outcome == 'failure'
      run: |
        if (Test-Path "build-native/vcpkg-manifest-install.log") {
          Get-Content "build-native/vcpkg-manifest-install.log"
        }
      shell: pwsh

    - name: Build Native DLL
      run: cmake --build build-native --config Release
      shell: pwsh

    - name: Verify DLL exists
      run: |
        if (!(Test-Path "build-native/Release/blindbean_fhe.dll")) {
          Write-Error "DLL not found!"
          exit 1
        }
        Write-Host "DLL size: $((Get-Item build-native/Release/blindbean_fhe.dll).Length) bytes"
      shell: pwsh

    # ── Java build ──
    - name: Install Core Library
      run: mvn clean install -B -Dblindbean.native.path=build-native/Release

    - name: Build and Test Example Application
      run: |
        cd blindbean-example
        mvn clean test -B
