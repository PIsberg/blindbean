name: Generate Demo GIF

on:
  push:
    branches: [ main ]
    paths:
      - 'src/main/java/**'
      - 'blindbean-example/src/main/java/**'
      - 'tools/demo-commands.sh'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-demo:
    name: Record demo and convert to GIF
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 26
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '26'
          distribution: 'oracle'
          cache: maven

      - name: Install asciinema
        run: sudo apt-get install -y asciinema

      - name: Install agg
        run: |
          curl -fsSL "https://github.com/asciinema/agg/releases/latest/download/agg-x86_64-unknown-linux-gnu" \
            -o /usr/local/bin/agg
          chmod +x /usr/local/bin/agg

      - name: Build BlindBean core library & install
        run: |
          ./mvnw clean install -DskipTests

      - name: Reset example placeholder files
        working-directory: blindbean-example
        run: |
          : > CLAUDE.md
          : > GEMINI.md

      - name: Record demo session
        working-directory: blindbean-example
        env:
          # asciinema needs a home dir for config
          HOME: /root
        run: |
          chmod +x ../tools/demo-commands.sh
          asciinema rec ../docs/blindbean-demo.cast \
            --command "bash ../tools/demo-commands.sh" \
            --cols 80 --rows 24 \
            --overwrite

      - name: Convert cast to GIF
        run: |
          agg docs/blindbean-demo.cast docs/demo.gif \
            --font-size 14 \
            --speed 1.2 \
            --idle-time-limit 3

      - name: Commit GIF via PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif docs/blindbean-demo.cast
          if git diff --staged --quiet; then
            echo "GIF unchanged — nothing to commit."
            exit 0
          fi
          BRANCH="chore/update-demo-gif-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: regenerate demo GIF"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: regenerate demo GIF" \
            --body "Auto-generated by the [demo workflow](../actions/workflows/demo.yml). Merges the updated \`docs/demo.gif\` and \`docs/blindbean-demo.cast\`." \
            --label "documentation" || true
